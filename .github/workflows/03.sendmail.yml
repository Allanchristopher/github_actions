name: send mail
on: push

jobs:
  sendmail:
    runs-on: ubuntu-latest

    steps:
      - name: Print hello world
        run: echo "hello world"

      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ACCOUNT }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Mail title
          body: Your message
          to: 05allanchristopher@gmail.com
          from: Allan Christopher <your-email@gmail.com>
