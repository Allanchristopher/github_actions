name: cronjobs
on:
  schedule:
    - cron: "* * * * *"

jobs:
  cronjobs:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: run python script
        run: python hello.py
